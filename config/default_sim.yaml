standard_Csensors: &standard_Csensors
  - name: "Grid_Voltage_AC"
    interval: 1.0
  - name: "Grid_Current_AC"
    interval: 1.0
  - name: "Input_Power_kW"
    interval: 0.5
  - name: "DC_Bus_Voltage"
    interval: 0.5
  - name: "Output_Voltage_DC"
    interval: 0.2
  - name: "Output_Current_DC"
    interval: 0.2
  - name: "Requested_Current_DC"
    interval: 0.2
  - name: "Cooling_Fan_RPM"
    interval: 1.0
  - name: "Pump_Speed_RPM"
    interval: 1.0
  - name: "Coolant_Flow_LPM"
    interval: 1.0
  - name: "Coolant_Pressure_kPa"
    interval: 1.0
  - name: "Coolant_Inlet_Temp"
    interval: 5.0
  - name: "Coolant_Outlet_Temp"
    interval: 5.0
  - name: "Ambient_Temp"
    interval: 30.0
  - name: "Cabinet_Temp"
    interval: 5.0
  - name: "Power_Module_Temp"
    interval: 2.0
  - name: "Cable_Connector_Temp"
    interval: 2.0
  - name: "Connector_Resistance_mOhm"
    interval: 5.0
  - name: "Derate_Level_Percent"
    interval: 1.0
  - name: "EV_State_of_Charge"
    interval: 5.0
  - name: "CState"
    emit_on_change: true
    heartbeat_interval_sec: 30.0
  - name: "Session_Duration"
    interval: 1.0
  - name: "Warning_Code"
    emit_on_change: true
    heartbeat_interval_sec: 30.0
  - name: "Error_Code"
    emit_on_change: true
    heartbeat_interval_sec: 30.0

.standard_site_sensors: &standard_site_sensors
  - name: "site_total_power_kw"
    interval: 1.0
  - name: "site_grid_voltage_v"
    interval: 1.0
  - name: "site_ac_current_a"
    interval: 1.0
  - name: "site_power_available_kw"
    interval: 2.0
  - name: "main_breaker_load_percent"
    interval: 2.0
  - name: "number_of_active_sessions"
    interval: 1.0
  - name: "ambient_temp_c"
    interval: 60.0

simulation:
  tick_rate_sec: 0.05
  backfill_days: 186
  backfill_log_interval_sec: 300
  realtime_log_interval_sec: 30
  write_buffer_max_rows: 15000
  write_buffer_max_age_sec: 2.0
  mode: "realtime"
  # history mode options:
  # mode: "history"
  # history_end_time: "2026-04-14T00:00:00"
  # history_duration_days: 7

writers:
  - type: csv_per_sensor
    config:
      output_dir: "/data/split_sensors"
      max_size_mb: 25.0
      flush_every_batches: 8
      allow_backfill: true
      allow_realtime: false

#  - type: csv
#    config:
#      output_dir: "/data/unified"
#      filename: "ev_history.csv"
#      max_size_mb: 25.0
#      flush_every_batches: 8
#      allow_backfill: true
#      allow_realtime: false

  - type: mqtt
    config:
      host: "localhost"
      port: 1883
      base_topic: "ev_network/Site_Melbourne_North"
      payload_mode: "single_object_per_signal"
      timestamp_field: "timestamp"
      value_field: "value"
      include_sensor_in_payload: false
      allow_backfill: false
      allow_realtime: true
      max_buffer_size: 5000
      reconnect_min_delay: 1
      reconnect_max_delay: 60
      boot_backoff_max: 30.0
      fail_open: true

assets:
  - name: "AC.North"
    type: "ChargingSite"
    max_queue: 3
    sensors: *standard_site_sensors
    chargers:
      - name: "C01"
        sensors: *standard_Csensors

      - name: "C02"
        anomalies:
          - type: "FAN_FAILURE"
            start_sec: 600
            duration_sec: 7200
        sensors: *standard_Csensors

      - name: "C03"
        random_anomalies:
          enabled: true
          chance_per_hour: 0.02
          types: ["FAN_FAILURE", "CONNECTOR_ARCING", "BMS_CHATTER", "PUMP_DEGRADATION"]
          min_duration_sec: 1800
          max_duration_sec: 14400
        sensors: *standard_Csensors

      - name: "C04"
        random_anomalies:
          enabled: true
          chance_per_hour: 0.08
          types: ["FAN_FAILURE", "PUMP_DEGRADATION"]
          min_duration_sec: 3600
          max_duration_sec: 7200
        sensors: *standard_Csensors

      - name: "C05"
        anomalies:
          - type: "CONNECTOR_ARCING"
            start_sec: 3600
            duration_sec: 1800
        sensors: *standard_Csensors

      - name: "C06"
        random_anomalies:
          enabled: true
          chance_per_hour: 0.03
          types: ["BMS_CHATTER", "CONTACTOR_CHATTER", "SENSOR_DRIFT"]
          min_duration_sec: 900
          max_duration_sec: 3600
        sensors: *standard_Csensors
