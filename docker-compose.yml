services:
  ev-simulator:
    build: .
    container_name: ev-simulator
    network_mode: "host"
    restart: unless-stopped
    environment:
      # Tell the Python process where the mounted files are
      - SIM_CONFIG_PATH=/opt/apg/sim/default_sim.yaml
      - SIM_DATA_PATH=/data
      - PYTHONPATH=/app/src

    volumes:
      # Simulator config mounted read-only
      - /opt/apg/sim:/opt/apg/sim:ro

      # Output/state directory mounted read-write
      - /data:/data:rw